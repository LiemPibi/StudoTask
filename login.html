<!DOCTYPE html>
<html>
<head>
    <title>Log In</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1 class="logo">Log In</h1>

        <form id="loginForm">

            <div class="form-group">

                <label>Email / Username</label>

                <input
                    type="text"
                    id="loginUsername"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="loginPassword"
                    required>

            </div>

            <button class="btn">
                Log In
            </button>

        </form>

        <div class="link">
            <a href="signin.html">
                Create Account
            </a>
        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>

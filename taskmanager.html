<!DOCTYPE html>
<html>

<head>

    <title>Task Manager</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="page-container">

    <h1 class="page-title">
        Task Manager
    </h1>

    <div class="toolbar">

        <select id="sortSelect">

            <option value="deadline">
                Sort By Deadline
            </option>

            <option value="urgency">
                Sort By Urgency
            </option>

        </select>

        <button
            class="add-btn"
            onclick="location.href='todolist.html'">

            +

        </button>

    </div>

    <table class="task-table">

        <thead>

            <tr>

                <th>Title</th>
                <th>Deadline</th>
                <th>Urgency</th>

            </tr>

        </thead>

        <tbody id="taskBody">

        </tbody>

    </table>

</div>

<button
    class="dashboard-float"
    onclick="location.href='dashboard.html'">

    Dashboard

</button>

<script src="js/taskmanager.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="page-container">

    <h1 class="page-title">Task Manager</h1>

    <div class="toolbar">
        <select id="sortSelect" aria-label="Sort task manager">
            <option value="deadline">Sort By Deadline</option>
            <option value="urgency">Sort By Urgency</option>
        </select>

        <button class="add-btn" onclick="location.href='todolist.html'" aria-label="Add task">+</button>
    </div>

    <div class="table-wrapper">
        <table class="task-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Deadline</th>
                    <th>Urgency</th>
                    <th>Status</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody id="taskBody"></tbody>
        </table>
    </div>

</div>

<button class="dashboard-float" onclick="location.href='dashboard.html'">Dashboard</button>

<script src="js/taskmanager.js"></script>
</body>
</html>

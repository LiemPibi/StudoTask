<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1 class="logo">Sign In</h1>

        <form id="signupForm">

            <div class="form-group">
                <label>Email / Username</label>

                <input
                    type="text"
                    id="signupUsername"
                    required>
            </div>

            <div class="form-group">
                <label>Password</label>

                <input
                    type="password"
                    id="signupPassword"
                    required>
            </div>

            <button class="btn">
                Sign In
            </button>

        </form>

        <div class="link">
            <a href="login.html">
                Already have account?
            </a>
        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>

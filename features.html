<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Features</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="page-container">

    <h1 class="page-title">
        StudoTask Features
    </h1>

    <div class="stats-grid">

        <div class="stat-card">

            <h2 id="totalTask">
                0
            </h2>

            <p>Total Tasks</p>

        </div>

        <div class="stat-card">

            <h2 id="pendingTask">
                0
            </h2>

            <p>Pending</p>

        </div>

        <div class="stat-card">

            <h2 id="completedTask">
                0
            </h2>

            <p>Completed</p>

        </div>

    </div>

    <div class="progress-section">

        <h3>Study Progress</h3>

        <div class="progress-bar">

            <div
                id="progressFill"
                class="progress-fill">

            </div>

        </div>

        <p id="progressText">

            0%

        </p>

    </div>

    <div class="feature-grid">

        <div class="feature-card">

            <h3>Dashboard</h3>

            <p>
                Main page to access
                all StudoTask features.
            </p>

            <button
                class="btn"
                onclick="location.href='dashboard.html'">

                Open

            </button>

        </div>

        <div class="feature-card">

            <h3>Task Manager</h3>

            <p>
                Monitor assignments
                and urgency levels.
            </p>

            <button
                class="btn"
                onclick="location.href='taskmanager.html'">

                Open

            </button>

        </div>

        <div class="feature-card">

            <h3>To-Do List</h3>

            <p>
                Create, edit,
                delete and track tasks.
            </p>

            <button
                class="btn"
                onclick="location.href='todolist.html'">

                Open

            </button>

        </div>

        <div class="feature-card">

            <h3>Calendar</h3>

            <p>
                Visualize task deadlines
                using calendar view.
            </p>

            <button
                class="btn"
                onclick="location.href='calendar.html'">

                Open

            </button>

        </div>

    </div>

</div>

<button
    class="dashboard-float"
    onclick="location.href='dashboard.html'">

    Dashboard

</button>

<script src="js/features.js"></script>

</body>
</html>

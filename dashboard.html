<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- BUG FIX: was two <body> tags; merged into one with onload -->
<body onload="loadDashboard()">

<div class="dashboard">

    <h1>StudoTask</h1>

    <div class="welcome-card">

        <h2 id="welcomeUser">
            Welcome
        </h2>

        <p>
            Keep track and assist your study tasks
        </p>

    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <h2 id="totalTasks">0</h2>

            <p>Total Tasks</p>

        </div>

        <div class="stat-card">

            <h2 id="pendingTasks">0</h2>

            <p>Pending</p>

        </div>

        <div class="stat-card">

            <h2 id="completedTasks">0</h2>

            <p>Completed</p>

        </div>

    </div>

    <div class="progress-section">

        <h3>Progress</h3>

        <div class="progress-bar">

            <div
                id="progressFill"
                class="progress-fill">

            </div>

        </div>

    </div>

    <div class="dashboard-buttons">

        <!-- BUG FIX: Task Manager button was missing its closing </button> tag -->
        <button
            class="btn"
            onclick="location.href='taskmanager.html'">
            Task Manager
        </button>

        <button
            class="btn"
            onclick="location.href='calendar.html'">
            Calendar
        </button>

        <button
            class="btn"
            onclick="location.href='features.html'">
            Features
        </button>

        <button
            class="btn btn-secondary"
            onclick="logout()">
            Logout
        </button>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>

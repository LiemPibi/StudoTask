<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<!-- BUG FIX: was two <body> tags; merged into one with onload -->
<body onload="loadDashboard()">

<div class="dashboard">

    <h1>StudoTask</h1>

    <div class="welcome-card">

        <h2 id="welcomeUser">
            Welcome
        </h2>

        <p>
            Keep track and assist your study tasks
        </p>

    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <h2 id="totalTasks">0</h2>

            <p>Total Tasks</p>

        </div>

        <div class="stat-card">

            <h2 id="pendingTasks">0</h2>

            <p>Pending</p>

        </div>

        <div class="stat-card">

            <h2 id="completedTasks">0</h2>

            <p>Completed</p>

        </div>

    </div>

    <div class="progress-section">

        <h3>Progress</h3>

        <div class="progress-bar">

            <div
                id="progressFill"
                class="progress-fill">

            </div>

        </div>

    </div>

    <div class="dashboard-buttons">

        <button
            class="btn"
            onclick="location.href='taskmanager.html'">
            Task Manager
        </button>

        <button
            class="btn"
            onclick="location.href='calendar.html'">
            Calendar
        </button>

        <button
            class="btn"
            onclick="location.href='features.html'">
            Features
        </button>

        <button
            class="btn btn-secondary"
            onclick="openProfile()">
            Profile
        </button>

        <button
            class="btn btn-secondary"
            onclick="logout()">
            Logout
        </button>

    </div>

    <div id="profileModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); justify-content:center; align-items:center;">

        <div class="card" style="max-width:520px; width:calc(100% - 40px);">

            <h2 style="text-align:center; margin-bottom:18px;">Profile</h2>

            <form id="profileForm" onsubmit="return saveProfile(event)">

                <div class="form-group">

                    <label>Username</label>

                    <input type="text" id="profileUsername" required>

                </div>

                <div class="form-group">

                    <label>New Password</label>

                    <input type="password" id="profilePassword" required>

                </div>

                <div class="button-group" style="margin-top:8px;">

                    <button class="btn" type="submit">Save</button>

                    <button class="btn btn-secondary" type="button" onclick="closeProfile()">Cancel</button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="js/profile.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>

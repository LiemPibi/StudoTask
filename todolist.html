<!DOCTYPE html>
<html>

<head>

    <title>To-Do List</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="page-container">

    <h1 class="page-title">
        To-Do List
    </h1>

    <div class="todo-form">

        <input
            type="hidden"
            id="taskId">

        <input
            type="text"
            id="title"
            placeholder="Title">

        <textarea
            id="description"
            placeholder="Description"></textarea>

        <input
            type="url"
            id="link"
            placeholder="Task Link">

        <input
            type="date"
            id="startDate">

        <input
            type="date"
            id="deadline">

        <input
            type="date"
            id="finishDate">

        <select id="urgency">

            <option value="High">
                High
            </option>

            <option value="Medium">
                Medium
            </option>

            <option value="Low">
                Low
            </option>

        </select>

        <button
            class="btn"
            onclick="saveTask()">

            Save Task

        </button>

    </div>

    <hr>

    <div class="toolbar">

        <select id="sortTodo">

            <option value="title">
                Sort Title
            </option>

            <option value="deadline">
                Sort Deadline
            </option>

            <option value="urgency">
                Sort Urgency
            </option>

        </select>

    </div>

    <table class="task-table">

        <thead>

        <tr>

            <th>Done</th>
            <th>Title</th>
            <th>Description</th>
            <th>Deadline</th>
            <th>Urgency</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody id="todoBody">

        </tbody>

    </table>

</div>

<button
    class="dashboard-float"
    onclick="location.href='dashboard.html'">

    Dashboard

</button>

<script src="js/todolist.js"></script>

</body>

</html>
